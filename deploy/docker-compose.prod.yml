services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - frontend-dist:/srv:ro
    environment:
      - CODEX_DOMAIN=${CODEX_DOMAIN:-localhost}
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - DATABASE_PATH=/data/codex.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set. Run: export JWT_SECRET=$(openssl rand -hex 32)}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-}
    volumes:
      - codex-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1536M
    restart: unless-stopped

  frontend-build:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    volumes:
      - frontend-dist:/dist
    entrypoint: ["sh", "-c", "cp -r /usr/share/nginx/html/* /dist/"]

  nine-router:
    image: ghcr.io/decolua/9router:latest
    profiles:
      - routers
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  cli-relay:
    image: ghcr.io/kittors/clirelay:latest
    profiles:
      - routers
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  cli-proxy-api:
    image: ghcr.io/router-for-me/cliproxyapi:latest
    profiles:
      - routers
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  ai-client2api:
    image: ghcr.io/justlovemaki/aiclient2api:latest
    profiles:
      - routers
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

volumes:
  codex-data:
  caddy-data:
  caddy-config:
  frontend-dist:
