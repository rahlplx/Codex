services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_PATH=/data/codex.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set. Run: export JWT_SECRET=$(openssl rand -hex 32)}
    volumes:
      - codex-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1536M
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  nine-router:
    image: ghcr.io/decolua/9router:latest
    ports:
      - "20128:20128"
    profiles:
      - routers
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  cli-relay:
    image: ghcr.io/kittors/clirelay:latest
    ports:
      - "3456:3456"
    profiles:
      - routers
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  cli-proxy-api:
    image: ghcr.io/router-for-me/cliproxyapi:latest
    ports:
      - "8080:8080"
    profiles:
      - routers
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  ai-client2api:
    image: ghcr.io/justlovemaki/aiclient2api:latest
    ports:
      - "3100:3100"
    profiles:
      - routers
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

volumes:
  codex-data:
