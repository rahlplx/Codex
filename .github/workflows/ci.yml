name: CI

on:
  push:
    branches: ["main", "claude/**", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint placeholder
        run: echo "No linter configured yet — add one in docs/todos/BACKLOG.md"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests placeholder
        run: echo "No test runner configured yet — add one in docs/todos/BACKLOG.md"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Integration tests placeholder
        run: echo "No integration tests configured yet"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - name: E2E tests placeholder
        run: echo "No E2E tests configured yet"

  telemetry:
    name: Telemetry Push
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Record pipeline run
        run: |
          mkdir -p logs/pipeline
          echo "{\"run_id\":\"${{ github.run_id }}\",\"sha\":\"${{ github.sha }}\",\"ref\":\"${{ github.ref }}\",\"status\":\"${{ job.status }}\",\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            >> logs/pipeline/${{ github.run_id }}.jsonl
