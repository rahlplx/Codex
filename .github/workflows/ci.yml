name: CI

on:
  push:
    branches: ["main", "claude/**", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint placeholder
        run: echo "No linter configured yet. Add one via docs/todos/BACKLOG.md"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run unit test harness
        run: bash tests/unit/harness.sh

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Integration tests placeholder
        run: echo "No integration tests configured yet"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - name: E2E tests placeholder
        run: echo "No E2E tests configured yet"

  telemetry:
    name: Telemetry Push
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, e2e-tests]
    if: ${{ always() }}
    steps:
      - name: Record pipeline run
        env:
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          LINT_RESULT: ${{ needs.lint.result }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INT_RESULT: ${{ needs.integration-tests.result }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "## Pipeline Run: ${RUN_ID}"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Lint | ${LINT_RESULT} |"
            echo "| Unit Tests | ${UNIT_RESULT} |"
            echo "| Integration Tests | ${INT_RESULT} |"
            echo "| E2E Tests | ${E2E_RESULT} |"
            echo ""
            echo "**SHA:** ${SHA} | **Ref:** ${REF} | **Time:** ${TS}"
          } >> "$GITHUB_STEP_SUMMARY"
